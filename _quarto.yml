project:
  type: website
  output-dir: _site

website:
  title: "Erwin Lares"
  description: "Linguist, data scientist, potter, aikidoka"
  site-url: https://erwinlares.com
  favicon: favicon.png

  navbar:
    left:
      - text: "About"
        href: about/index.qmd
      - text: "Blog"
        href: posts/index.qmd
      - text: "CV"
        href: cv/index.qmd
    right:
      - icon: github
        href: https://github.com/erwinlares
      - icon: envelope
        href: mailto:lares@wisc.edu

  page-footer:
    left: "© Erwin Lares"
    center: "Built with Quarto, deployed with Netlify, version-controlled on GitHub"
    right:
      - icon: github
        href: https://github.com/erwinlares

format:
  html:
    theme: lux
    css: styles.css
    toc: false
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">